<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTR Listening Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rust:#c8922a;--rust-lt:#e8ad4a;--cream:#e8e0d4;
  --muted:rgba(232,224,212,0.45);--dark:#0d0c0b;--dark2:#141210;
  --dark3:#1c1a17;--dark4:#242118;--border:rgba(200,146,42,0.18);
  --player-h:80px;
}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
/* GATE */
#gate{position:fixed;inset:0;z-index:100;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem}
.gate-logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.12em;color:var(--rust)}
.gate-sub{font-family:'Barlow Condensed',sans-serif;letter-spacing:.25em;text-transform:uppercase;font-size:.75rem;color:var(--muted)}
.gate-box{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:2.5rem 3rem;display:flex;flex-direction:column;gap:1.2rem;width:100%;max-width:420px;text-align:center}
.gate-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em;color:var(--cream)}
.gate-box p{font-size:.9rem;color:var(--muted);line-height:1.5}
.gate-box input[type=email]{background:var(--dark4);border:1px solid var(--border);border-radius:6px;padding:.75rem 1rem;color:var(--cream);font-family:'Barlow',sans-serif;font-size:1rem;width:100%;outline:none;transition:border-color .2s}
.gate-box input[type=email]:focus{border-color:var(--rust)}
.gate-box input[type=email]::placeholder{color:var(--muted)}
#gate-btn{background:var(--rust);color:#0d0c0b;border:none;border-radius:6px;padding:.75rem 1.5rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;transition:background .2s}
#gate-btn:hover{background:var(--rust-lt)}
#gate-err{color:#e05a2b;font-size:.85rem;display:none}
/* HEADER */
header{position:sticky;top:0;z-index:50;background:var(--dark2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;height:58px}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--rust);white-space:nowrap;text-decoration:none}
.hdr-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
.hdr-playlist-name{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:600;letter-spacing:.05em;flex:1;min-width:0;outline:none;padding:.25rem .4rem;transition:border-color .2s}
.hdr-playlist-name:focus{border-bottom-color:var(--rust)}
.hdr-email{font-size:.78rem;color:var(--muted);white-space:nowrap}
.hdr-save{background:var(--rust);color:#0d0c0b;border:none;border-radius:5px;padding:.4rem 1rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.08em;cursor:pointer;transition:background .2s;white-space:nowrap}
.hdr-save:hover{background:var(--rust-lt)}
.hdr-save.saved{background:#2a6a2a;color:#b8f0b8}
/* LAYOUT */
main{flex:1;display:grid;grid-template-columns:1fr 380px;height:calc(100vh - 58px - var(--player-h));overflow:hidden}
/* CATALOG */
.catalog-panel{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.catalog-toolbar{padding:.85rem 1rem;background:var(--dark2);border-bottom:1px solid var(--border);display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.catalog-toolbar input[type=text]{flex:1;min-width:140px;background:var(--dark4);border:1px solid var(--border);border-radius:5px;padding:.5rem .75rem;color:var(--cream);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none}
.catalog-toolbar input[type=text]:focus{border-color:var(--rust)}
.catalog-toolbar input[type=text]::placeholder{color:var(--muted)}
.catalog-toolbar select{background:var(--dark4);border:1px solid var(--border);border-radius:5px;padding:.5rem .6rem;color:var(--cream);font-family:'Barlow',sans-serif;font-size:.85rem;outline:none;cursor:pointer}
.catalog-count{font-size:.75rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;white-space:nowrap}
.catalog-list{flex:1;overflow-y:auto;padding:.4rem 0}
.catalog-list::-webkit-scrollbar{width:5px}
.catalog-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.song-row{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:.75rem;padding:.5rem 1rem;border-bottom:1px solid rgba(200,146,42,.06);transition:background .15s}
.song-row:hover{background:var(--dark3)}
.song-row.playing{background:rgba(200,146,42,.08)}
.song-thumb-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.song-thumb-wrap img{width:44px;height:44px;border-radius:4px;object-fit:cover;display:block;background:var(--dark4)}
.song-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;cursor:pointer;color:var(--rust-lt);font-size:1rem}
.song-row:hover .song-play-overlay,.song-row.playing .song-play-overlay{opacity:1}
.song-info{min-width:0}
.song-title{font-family:'Barlow Condensed',sans-serif;font-size:.97rem;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-row.playing .song-title{color:var(--rust-lt)}
.song-meta{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-add{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--rust);font-size:1.1rem;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.song-add:hover{background:var(--rust);color:#0d0c0b}
.song-add.in-list{color:var(--muted);border-color:rgba(200,146,42,.1);cursor:default}
.song-add.in-list:hover{background:transparent;color:var(--muted)}
/* PLAYLIST */
.playlist-panel{display:flex;flex-direction:column;background:var(--dark2);overflow:hidden}
.playlist-header{padding:.85rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.playlist-header h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--rust)}
.playlist-stats{font-size:.75rem;color:var(--muted)}
.playlist-actions{display:flex;gap:.5rem}
.pl-btn{background:var(--dark4);border:1px solid var(--border);border-radius:5px;color:var(--cream);font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.06em;padding:.35rem .75rem;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.pl-btn:hover{background:var(--rust);color:#0d0c0b;border-color:var(--rust)}
.pl-btn.primary{background:var(--rust);color:#0d0c0b;border-color:var(--rust)}
.pl-btn.primary:hover{background:var(--rust-lt)}
.playlist-list{flex:1;overflow-y:auto;padding:.4rem 0}
.playlist-list::-webkit-scrollbar{width:5px}
.playlist-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.pl-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.6rem;color:var(--muted);font-size:.88rem;text-align:center;padding:2rem}
.pl-empty-icon{font-size:2.5rem;opacity:.3}
.pl-item{display:grid;grid-template-columns:24px 28px 36px 1fr auto;align-items:center;gap:.6rem;padding:.45rem .85rem;border-bottom:1px solid rgba(200,146,42,.06);cursor:grab;transition:background .15s;user-select:none}
.pl-item:hover{background:var(--dark3)}
.pl-item.dragging{opacity:.4}
.pl-item.drag-over{border-top:2px solid var(--rust)}
.pl-item.playing{background:rgba(200,146,42,.1)}
.pl-drag{color:var(--muted);font-size:.9rem;cursor:grab}
.pl-num{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--muted);text-align:center}
.pl-item.playing .pl-num{color:var(--rust)}
.pl-thumb{width:36px;height:36px;border-radius:3px;object-fit:cover}
.pl-info{min-width:0;cursor:pointer}
.pl-title{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-item.playing .pl-title{color:var(--rust-lt)}
.pl-artist{font-size:.72rem;color:var(--muted)}
.pl-remove{background:transparent;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.2rem .3rem;border-radius:3px;line-height:1;transition:color .15s}
.pl-remove:hover{color:#e05a2b}
.playlist-footer{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.5rem}
/* PLAYER */
#player-bar{position:fixed;bottom:0;left:0;right:0;height:var(--player-h);background:var(--dark2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1.25rem;z-index:40}
.pb-art{width:50px;height:50px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--dark4)}
.pb-info{min-width:0;width:180px;flex-shrink:0}
.pb-title{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-artist{font-size:.75rem;color:var(--muted)}
.pb-controls{display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.pb-btn{background:transparent;border:none;color:var(--cream);font-size:1.1rem;cursor:pointer;padding:.35rem;border-radius:50%;transition:color .15s;display:flex;align-items:center;justify-content:center}
.pb-btn:hover{color:var(--rust-lt)}
.pb-play{background:var(--rust);color:#0d0c0b;width:40px;height:40px;border-radius:50%}
.pb-play:hover{background:var(--rust-lt);color:#0d0c0b}
.pb-progress{flex:1;display:flex;align-items:center;gap:.6rem}
.pb-time{font-size:.73rem;color:var(--muted);white-space:nowrap;width:36px;text-align:center}
.pb-seek{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--dark4);border-radius:2px;cursor:pointer;outline:none;background-image:linear-gradient(var(--rust),var(--rust));background-size:0% 100%;background-repeat:no-repeat}
.pb-seek::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--rust-lt);border-radius:50%;cursor:pointer}
.pb-vol-wrap{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.pb-vol-icon{font-size:.9rem;color:var(--muted)}
.pb-vol{width:80px;-webkit-appearance:none;appearance:none;height:3px;background:var(--dark4);border-radius:2px;cursor:pointer;outline:none;background-image:linear-gradient(var(--rust),var(--rust));background-size:85% 100%;background-repeat:no-repeat}
.pb-vol::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--rust-lt);border-radius:50%}
/* TOAST */
#toast{position:fixed;bottom:calc(var(--player-h) + 12px);right:1rem;background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:.6rem 1rem;font-size:.85rem;color:var(--cream);opacity:0;pointer-events:none;transition:opacity .3s;z-index:60}
#toast.show{opacity:1}
@media(max-width:700px){main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}.catalog-panel{border-right:none;border-bottom:1px solid var(--border)}.pb-info,.pb-vol-wrap{display:none}}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-logo">Hello Texas Records</div>
  <div class="gate-sub">Listening Room &nbsp;&middot;&nbsp; Members Only</div>
  <div class="gate-box">
    <h2>Welcome to the Listening Room</h2>
    <p>Enter your email to build playlists, save your favorites, and play the full HTR catalog.</p>
    <input type="email" id="gate-email" placeholder="your@email.com" autocomplete="email">
    <button id="gate-btn">Enter the Room</button>
    <div id="gate-err">Please enter a valid email address.</div>
  </div>
</div>
<header>
  <a class="hdr-logo" href="index.html">&larr; HTR</a>
  <div class="hdr-divider"></div>
  <input class="hdr-playlist-name" id="playlist-name" type="text" value="My Playlist" maxlength="60">
  <div class="hdr-email" id="hdr-email"></div>
  <button class="hdr-save" id="save-btn" onclick="savePlaylist()">Save</button>
</header>
<main>
  <div class="catalog-panel">
    <div class="catalog-toolbar">
      <input type="text" id="search-input" placeholder="Search songs, artists, albums&hellip;" oninput="renderCatalog()">
      <select id="artist-filter" onchange="renderCatalog()"><option value="">All Artists</option></select>
      <span class="catalog-count" id="catalog-count"></span>
    </div>
    <div class="catalog-list" id="catalog-list"></div>
  </div>
  <div class="playlist-panel">
    <div class="playlist-header">
      <div>
        <h3>Playlist</h3>
        <div class="playlist-stats" id="pl-stats">0 songs</div>
      </div>
      <div class="playlist-actions">
        <button class="pl-btn" onclick="shufflePlaylist()">&harr; Shuffle</button>
        <button class="pl-btn primary" onclick="playAll()">&#9654; Play All</button>
      </div>
    </div>
    <div class="playlist-list" id="playlist-list"></div>
    <div class="playlist-footer">
      <button class="pl-btn" onclick="clearPlaylist()">Clear All</button>
    </div>
  </div>
</main>
<div id="player-bar">
  <img class="pb-art" id="pb-art" src="" alt="">
  <div class="pb-info">
    <div class="pb-title" id="pb-title">&mdash;</div>
    <div class="pb-artist" id="pb-artist">Select a song to play</div>
  </div>
  <div class="pb-controls">
    <button class="pb-btn" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
    <button class="pb-btn pb-play" id="pb-play" onclick="togglePlay()">&#9654;</button>
    <button class="pb-btn" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
  </div>
  <div class="pb-progress">
    <span class="pb-time" id="pb-cur">0:00</span>
    <input type="range" class="pb-seek" id="pb-seek" min="0" max="100" step="0.1" value="0" oninput="seek(this.value)">
    <span class="pb-time" id="pb-dur">0:00</span>
  </div>
  <div class="pb-vol-wrap">
    <span class="pb-vol-icon">&#128266;</span>
    <input type="range" class="pb-vol" id="pb-vol" min="0" max="1" step="0.02" value="0.85" oninput="setVolume(this.value)">
  </div>
</div>
<div id="toast"></div>

let userEmail='',playlist=[],currentIdx=-1,catalogPlayingId=-1,isPlaying=false,dragSrcIdx=null;
const aud=new Audio();aud.volume=0.85;

document.getElementById('gate-btn').addEventListener('click',enterRoom);
document.getElementById('gate-email').addEventListener('keydown',e=>{if(e.key==='Enter')enterRoom()});

function enterRoom(){
  const v=document.getElementById('gate-email').value.trim();
  if(!v||!v.includes('@')||!v.includes('.')){document.getElementById('gate-err').style.display='block';return;}
  userEmail=v.toLowerCase();
  document.getElementById('gate').style.display='none';
  document.getElementById('hdr-email').textContent=userEmail;
  loadFromStorage();populateArtistFilter();renderCatalog();renderPlaylist();
}

function savePlaylist(){
  const name=document.getElementById('playlist-name').value.trim()||'My Playlist';
  const all=JSON.parse(localStorage.getItem('htr_playlists')||'{}');
  all[userEmail]={name,songs:playlist,saved:new Date().toISOString()};
  localStorage.setItem('htr_playlists',JSON.stringify(all));
  const btn=document.getElementById('save-btn');
  btn.textContent='Saved ✓';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='Save';btn.classList.remove('saved');},2000);
  showToast('Playlist saved!');
}

function loadFromStorage(){
  const all=JSON.parse(localStorage.getItem('htr_playlists')||'{}');
  const saved=all[userEmail];
  if(saved){playlist=saved.songs||[];document.getElementById('playlist-name').value=saved.name||'My Playlist';showToast('Welcome back — playlist loaded!');}
}

function populateArtistFilter(){
  const artists=[...new Set(CATALOG.map(s=>s.artist))].sort();
  const sel=document.getElementById('artist-filter');
  artists.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sel.appendChild(o);});
}

function renderCatalog(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const artist=document.getElementById('artist-filter').value;
  const filtered=CATALOG.filter(s=>(!artist||s.artist===artist)&&(!q||s.title.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q)||s.album.toLowerCase().includes(q)));
  document.getElementById('catalog-count').textContent=filtered.length+' songs';
  const list=document.getElementById('catalog-list');list.innerHTML='';
  filtered.forEach(song=>{
    const inList=playlist.some(p=>p.id===song.id);
    const playing=(catalogPlayingId===song.id)||(currentIdx>=0&&playlist[currentIdx]?.id===song.id);
    const row=document.createElement('div');row.className='song-row'+(playing?' playing':'');row.dataset.id=song.id;
    row.innerHTML=`<div class="song-thumb-wrap"><img src="${song.image}" alt="" onerror="this.src=''" loading="lazy"><div class="song-play-overlay" onclick="catalogPlay(${song.id})">${(catalogPlayingId===song.id&&!aud.paused)?'&#9646;&#9646;':'&#9654;'}</div></div><div class="song-info"><div class="song-title">${song.title}</div><div class="song-meta">${song.artist} &middot; ${song.album}</div></div><button class="song-add${inList?' in-list':''}" onclick="addToPlaylist(${song.id})" title="${inList?'Already in playlist':'Add to playlist'}">${inList?'&#10003;':'+'}</button>`;
    list.appendChild(row);
  });
}

function renderPlaylist(){
  const list=document.getElementById('playlist-list');list.innerHTML='';
  if(!playlist.length){list.innerHTML='<div class="pl-empty"><div class="pl-empty-icon">&#127925;</div><div>Your playlist is empty.<br>Add songs from the catalog on the left.</div></div>';document.getElementById('pl-stats').textContent='0 songs';return;}
  const mins=Math.round(playlist.length*3.5),hrs=Math.floor(mins/60),rem=mins%60;
  document.getElementById('pl-stats').textContent=`${playlist.length} songs · ${hrs>0?`~${hrs}h ${rem}m`:`~${mins} min`}`;
  playlist.forEach((song,idx)=>{
    const playing=idx===currentIdx&&isPlaying;
    const item=document.createElement('div');item.className='pl-item'+(idx===currentIdx?' playing':'');item.draggable=true;item.dataset.idx=idx;
    item.innerHTML=`<span class="pl-drag">&#8286;</span><span class="pl-num">${playing?'&#9654;':(idx+1)}</span><img class="pl-thumb" src="${song.image}" alt="" onerror="this.src=''" loading="lazy"><div class="pl-info" onclick="playFromPlaylist(${idx})"><div class="pl-title">${song.title}</div><div class="pl-artist">${song.artist}</div></div><button class="pl-remove" onclick="removeFromPlaylist(${idx})" title="Remove">&#10005;</button>`;
    item.addEventListener('dragstart',()=>{dragSrcIdx=idx;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');document.querySelectorAll('.pl-item').forEach(i=>i.classList.remove('drag-over'));});
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;
      const moved=playlist.splice(dragSrcIdx,1)[0];playlist.splice(idx,0,moved);
      if(currentIdx===dragSrcIdx)currentIdx=idx;
      else if(currentIdx>dragSrcIdx&&currentIdx<=idx)currentIdx--;
      else if(currentIdx<dragSrcIdx&&currentIdx>=idx)currentIdx++;
      dragSrcIdx=null;renderPlaylist();renderCatalog();
    });
    list.appendChild(item);
  });
}

function addToPlaylist(id){
  if(playlist.some(p=>p.id===id))return;
  const song=CATALOG.find(s=>s.id===id);if(!song)return;
  playlist.push({...song});renderPlaylist();renderCatalog();showToast('Added: '+song.title);
}

function removeFromPlaylist(idx){
  if(idx===currentIdx){aud.pause();aud.src='';currentIdx=-1;isPlaying=false;updatePlayerBar(null);}
  else if(idx<currentIdx)currentIdx--;
  playlist.splice(idx,1);renderPlaylist();renderCatalog();
}

function clearPlaylist(){
  if(!playlist.length)return;
  aud.pause();aud.src='';currentIdx=-1;isPlaying=false;playlist=[];
  updatePlayerBar(null);renderPlaylist();renderCatalog();
}

function shufflePlaylist(){
  for(let i=playlist.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[playlist[i],playlist[j]]=[playlist[j],playlist[i]];}
  currentIdx=-1;renderPlaylist();showToast('Playlist shuffled!');
}

function playAll(){if(playlist.length)playFromPlaylist(0);}

function catalogPlay(id){
  const song=CATALOG.find(s=>s.id===id);if(!song)return;
  if(catalogPlayingId===id&&!aud.paused){aud.pause();isPlaying=false;catalogPlayingId=-1;currentIdx=-1;updatePlayerBar(null);renderCatalog();return;}
  catalogPlayingId=id;currentIdx=-1;loadAndPlay(song);
}

function playFromPlaylist(idx){
  if(idx<0||idx>=playlist.length)return;
  currentIdx=idx;catalogPlayingId=-1;loadAndPlay(playlist[idx]);renderPlaylist();
}

function loadAndPlay(song){
  aud.src=song.src;aud.play().catch(()=>{});isPlaying=true;updatePlayerBar(song);renderCatalog();
}

function togglePlay(){
  if(!aud.src)return;
  if(aud.paused){aud.play();isPlaying=true;}else{aud.pause();isPlaying=false;}
  document.getElementById('pb-play').innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;';renderPlaylist();
}

function prevTrack(){if(currentIdx>0)playFromPlaylist(currentIdx-1);}
function nextTrack(){
  if(currentIdx>=0&&currentIdx<playlist.length-1)playFromPlaylist(currentIdx+1);
  else if(catalogPlayingId>=0){aud.pause();isPlaying=false;catalogPlayingId=-1;updatePlayerBar(null);renderCatalog();}
}
function seek(v){if(aud.duration)aud.currentTime=(v/100)*aud.duration;}
function setVolume(v){aud.volume=v;document.getElementById('pb-vol').style.backgroundSize=(v*100)+'% 100%';}

function updatePlayerBar(song){
  const art=document.getElementById('pb-art'),title=document.getElementById('pb-title'),artist=document.getElementById('pb-artist'),play=document.getElementById('pb-play');
  if(!song){art.src='';title.textContent='—';artist.textContent='Select a song to play';play.innerHTML='&#9654;';isPlaying=false;return;}
  art.src=song.image;title.textContent=song.title;artist.textContent=song.artist+' · '+song.album;play.innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;';
}

function fmt(s){if(!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}

aud.addEventListener('timeupdate',()=>{
  const cur=aud.currentTime,dur=aud.duration,pct=dur?(cur/dur)*100:0;
  document.getElementById('pb-cur').textContent=fmt(cur);
  document.getElementById('pb-dur').textContent=fmt(dur);
  const seek=document.getElementById('pb-seek');seek.value=pct;seek.style.backgroundSize=pct+'% 100%';
});
aud.addEventListener('ended',()=>{
  if(currentIdx>=0&&currentIdx<playlist.length-1)playFromPlaylist(currentIdx+1);
  else{isPlaying=false;document.getElementById('pb-play').innerHTML='&#9654;';renderPlaylist();}
});
aud.addEventListener('play',()=>{isPlaying=true;document.getElementById('pb-play').innerHTML='&#9646;&#9646;';renderPlaylist();});
aud.addEventListener('pause',()=>{isPlaying=false;document.getElementById('pb-play').innerHTML='&#9654;';renderPlaylist();});

document.getElementById('pb-vol').style.backgroundSize='85% 100%';

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
document.getElementById('playlist-name').addEventListener('change',()=>{if(userEmail&&playlist.length)savePlaylist();});
